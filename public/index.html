<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyNode Solutions</title>
    <link rel = "stylesheet" href = "style.css">
</head>

<body>
    <header class = "header">
        <h1>SkyNode Solutions</h1>
        <p class="slogan">Monitoramento inteligente para mentes inovadoras.</p>
    </header>

    <main>
        <h2>DASHBOARD</h2>
        
        <section class="cards">
            <div id="card-cpu" class="card">
                <h3>CPU</h3>
                <span id="cpu">0%</span>
            </div>

            <div id="card-ram" class="card">
                <h3>RAM</h3>
                <span id="ram">0 GB</span>
            </div>

            <div id="card-temp" class="card">
                <h3>TEMPERATURA</h3>
                <span id="temp">0°C</span>
            </div>
        </section>
    </main>

    <script src = "script.js"></script>

    <footer>
        <p>&copy; 2026 Amanda de Lanes Souza - Todos os direitos reservados.</p>
    </footer>
</body>
</html>
